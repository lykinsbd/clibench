name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract tag message
        id: tag
        run: |
          # Get the annotated tag message (everything after the first line)
          MSG=$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")
          if [[ -z "$MSG" ]]; then
            MSG=$(git tag -l --format='%(contents:subject)' "${GITHUB_REF_NAME}")
          fi
          # Write to file to preserve newlines
          echo "$MSG" > /tmp/release-notes.md
          # Append commit list since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            echo "" >> /tmp/release-notes.md
            echo "## Commits since ${PREV_TAG}" >> /tmp/release-notes.md
            git log --oneline "${PREV_TAG}..${GITHUB_REF_NAME}" >> /tmp/release-notes.md
          fi

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              DIR="clibench-${VERSION}-${GOOS}-${GOARCH}"
              mkdir -p "dist/${DIR}"
              for CMD in bench server smoketest; do
                GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" \
                  -o "dist/${DIR}/${CMD}" ./cmd/${CMD}
              done
              cp LICENSE README.md "dist/${DIR}/"
              tar -czf "dist/${DIR}.tar.gz" -C dist "${DIR}"
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: dist/*.tar.gz
