name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w"
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              DIR="clibench-${VERSION}-${GOOS}-${GOARCH}"
              mkdir -p "dist/${DIR}"
              for CMD in bench server smoketest; do
                GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" \
                  -o "dist/${DIR}/${CMD}" ./cmd/${CMD}
              done
              cp LICENSE README.md "dist/${DIR}/"
              tar -czf "dist/${DIR}.tar.gz" -C dist "${DIR}"
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz
