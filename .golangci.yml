version: "2"
linters:
  settings:
    errcheck:
      exclude-functions:
        # SSH protocol acks — no meaningful recovery
        - (*golang.org/x/crypto/ssh.Request).Reply
        - (golang.org/x/crypto/ssh.NewChannel).Reject
        - (golang.org/x/crypto/ssh.Channel).SendRequest
        - (golang.org/x/crypto/ssh.Channel).Write
        # Writing to streams in session handlers
        - io.WriteString
        # Best-effort teardown — qdisc may already be removed
        - github.com/vishvananda/netlink.QdiscDel
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      # Fire-and-forget server goroutines in cmd/ entrypoints
      - linters:
          - errcheck
        source: "go .+\\.(ListenAndServe|ListenAndServeTLS|ListenAndServeH3)\\(\\)"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
